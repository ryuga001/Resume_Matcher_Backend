name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.test_settings
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      JWT_SECRET: ci-jwt-secret-not-for-production
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Show repository layout
        run: ls -la

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          grep -vE "^(cuda-|nvidia-|triton==|torch==)" requirements.txt \
            > /tmp/requirements-ci.txt
          uv pip install --system \
            --index-strategy unsafe-best-match \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            -r /tmp/requirements-ci.txt

      - name: Verify build
        run: python manage.py check

      - name: Run unit tests
        run: python manage.py test tests --no-input --verbosity=2
